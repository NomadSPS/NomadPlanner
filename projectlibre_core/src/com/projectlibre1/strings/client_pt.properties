Message.invalidDependency.mf=inválido {0}.\nPor favor, use os números de identificaçăo de tarefa válidos.\n\u00B7 {0} a informaçăo é expressa como\: {0} Número de identificaçăo, dependęncia e liderança ou lag tempo.\n\u00B7 Vocę também pode usar a caixa de diálogo de Informaçőes sobre a Tarefa.
Message.invalidDuration=Duraçăo inválida\nEste năo é um valor válido para duraçăo.\nPor favor, tente um valor como 24 horas (24h), 3 dias (3D), ou 9ED de dias decorridos.
Message.invalidInput=O valor năo é válido.
Message.invalidIntersection=Resultante de tempo de trabalho é inválido\n\nHá uma tarefa que, se cruza com o seu calendário. Năo dispőe tempo suficiente de trabalho para qualquer trabalho a ser realizado.\nA tarefa irá ignorar o calendário.  \nPara corrigir a situaçăo, vocę pode alterar a tarefa ou o calendário, ou escolher a opçăo "Ignore Resource Calendar" para a tarefa.
Message.invalidRate=Esta năo é uma taxa válida.\nPara recursos de trabalho (năo-material), digite a quantidade taxa seguido de uma barra (/), e, em seguida, a abreviatura para o período de tempo. Por exemplo, "100 / h".\nPara os recursos materiais, digite a quantidade taxa sem um período de corte e tempo\nPor exemplo, "10". Se o rótulo do material é "barril", isso significaria "$ 10/barril".
Message.invaliidUnits=Este năo é um valor válido de Unidades\n\nPara recursos de trabalho (năo-material), digite um número.\n\nAtribuiçőes de recursos materiais pode ser fixa ou variável. Para uma atribuiçăo de recurso material fixos, digite as unidades de valor sozinho. Por exemplo, "10" significa "10 barris", se o rótulo do material foi "barril".\n\nPara uma variável de atribuiçăo de recursos de material, tipo o valor das unidades, seguido por uma barra (/) e, em seguida, a abreviatura para o período de tempo. Por exemplo, "10 / M" significa "12 mil barris por męs".
