Message.invalidCost=Custo inválido\nEste năo é um custo válido. O custo deve ser expresso em números. O símbolo da moeda é opcional.\nO símbolo da moeda é o padrăo do sistema.
Message.invalidDate=Data inválida\nEsta năo é uma data válida, ou está fora do intervalo de datas, que é de 1 de janeiro de 1970 até 31 de dezembro de 2049.\nO formato de data é o formato de data do seu sistema. Por exemplo\: 3/12/06 ou 3 Mar 2006.
