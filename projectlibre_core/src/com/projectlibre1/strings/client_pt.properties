tip.1.description=Vocę pode se tornar um membro da comunidade ProjectLibre em http://www.projectlibre.org Teremos actualizaçőes, informaçőes e eventos da comunidade.
tip.1.name=Comunidade ProjectLibre, Junte-se
tip.2.description=Vocę pode fazer clique direito do mouse no Gráfico de Gantt, células da planilha, cabeças de planilha, e o canto superior esquerdo da planilha para obter menus sensíveis ao contexto para modificar o modo de exibiçăo.
tip.2.name=Modificar visőes
tip.3.description=Vocę pode contribuir para ProjectLibre! Estamos ŕ procura de tradutores e desenvolvedores para melhorar mais e mais o ProjectLibre. Contacte partners@projectlibre.org.
tip.3.name=Contribuir para ProjectLibre
tip.4.description=O histograma e gráficos săo dinâmicos e dependem de quais as tarefas que vocę selecionou anteriormente.
tip.4.name=Gráficos dinâmicos
tip.5.description=Vocę pode editar diretamente no Diagrama de Rede (PERT).
tip.5.name=Editar blocos de rede
tip.6.description=Vocę pode inserir um parágrafo ou remover tarefas para fazer uma hierarquia para o seu projeto. Isso será refletido na visao WBS também.
tip.6.name=Fazer uma hierarquia de projeto
tip.7.description=Vocę pode usar o mouse para vincular tarefas, estende-las, completa-las, move-las e dividi-las.
tip.7.name=Operaçőes de mouse
tip.8.description=Usualmente vocę vai querer manter a ligaçăo (Fim-Inicio) FS padrăo entre as tarefas. Ocasionalmente, vocę pode querer SS e FF, mas SF săo muito raros. Vocę pode alterar o tipo de link, clicando sobre ele. Vocę também pode definir um atraso.
tip.8.name=Tipos de ligaçăo
tip.9.description=É sempre uma boa idéia gravar uma linha de base para o seu projeto. ProjectLibre permite economizar até 11 deles que vocę pode exibir no Gantt e usar para Análise de Valor Agregado.
tip.9.name=As linhas de base
tip.10.description=Vocę pode ajustar a impressăo de uma página, aumentando/diminuindo o zoom do Gantt e redimensionar ou ocultar colunas. Use pré-visualizaçăo de impressăo para verificar.
tip.10.name=Imprimir em uma página
tip.11.description=Em ProjectLibre Vocę pode abrir arquivos criados pelo Microsoft Project, e vocę também pode grava-los de volta para o formato XML, da Microsoft.
tip.11.name=Compatibilidade com MS Project
tip.12.description=ProjectLibre tem muitos campos definidos pelo usuário ŕ sua disposiçăo. Experimente clicar o botăo direito em um cabeçalho de planilha e ver.
tip.12.name=Campos definidos pelo usuário
