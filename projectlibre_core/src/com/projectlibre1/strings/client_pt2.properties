tip.1.description=Vocę pode clicar com o botăo direito do mouse no gráfico de Gantt, nas células da planilha, nos cabeçalhos da planilha, e no canto superior esquerdo da planilha para abrir um menu sensível ao contexto para modificar a visăo.
tip.1.name=Menus sensíveis ao contexto
tip.2.description=Vocę pode exibir o gráfico de Gantt para recursos, bem como tarefas selecionando "Mostrar Alocaçőes" no menu sensível ao contexto. Vocę pode fazę-lo clicando com o botăo direito do mouse no gráfico de Gantt.
tip.2.name=Barras de alocaçőes
tip.3.description=
tip.3.name=
tip.4.description=Vocę pode contribuir para o ProjectLibre! Nós estamos procurando tradutores e desenvolvedores para tornar o ProjectLibre cada vez melhor. Contate partners@projectlibre.org.
tip.4.name=Contribuiçăo para o ProjectLibre
tip.5.description=O histograma e gráficos săo dinâmicos e dependem de quais tarefas vocę tenha selecionado.
tip.5.name=Gráficos dinâmicos
tip.6.description=Vocę pode editar diretamente no Diagrama de Rede (gráfico PERT).
tip.6.name=Editar Blocos de rede
tip.7.description=Vocę pode indentar e desindentar tarefas para fazer uma hierarquia para seu projeto. Isto será refletido na visăo da EAP também.
tip.7.name=Fazer um projeto hierárquico
tip.8.description=Vocę pode usar o mouse para vincular tarefas, extendę-las, completá-las, movę-las e dividi-las.
tip.8.name=Operaçőes do mouse
tip.9.description=Usualmente vocę poderá deixar como padrăo os vínculos entre as tarefas como TI (Término-Início). Ocasionalmente vocę pode querer II (Início-Início) e TT (Término-Término), mas IT (Início-Término) é muito raro. Vocę pode alterar o tipo do vínculo clicando nele. Vocę pode também escolher uma latęncia.
tip.9.name=Tipos de vínculos
tip.10.description=É sempre uma boa prática salvar uma linha de base para seu projeto. O ProjectLibre permite vocę salvar até 11 linhas de base as quais podem ser mostradas no gráfico de Gantt e usadas para Análise do Valor Agregado.
tip.10.name=Linhas de base
tip.11.description=Vocę pode ajustar a impressăo da página através de mais/menos zoom no gráfico de Gantt e redimensionando ou ocultando colunas. Use "Visualizar Impressăo" para verificar.
tip.11.name=Imprimindo uma página
tip.12.description=Vocę pode abrir arquivos criados pelo Microsoft Project no ProjectLibre, e vocę pode também salvá-los como fora do formato XML da Microsoft.
tip.12.name=Compatibilidade com MS Project
tip.13.description=Vocę pode mostrar mais que apenas trabalho nas planilhas de Uso da Tarefa e Uso do Recurso. Clique com o botăo direito no cabeçalho amarelo da linha para ver outras possibilidades.
tip.13.name=Detalhes de visualizaçăo dos campos
tip.14.description=O ProjectLibre tem vários campos definidos pelo usuário a sua disposiçăo. Clique com o botăo direito no cabeçalho da planilha e veja.
tip.14.name=Campos definidos pelo usuário
tip.15.description=Vocę pode atribuir calendários para tarefas, recursos e projetos para contabilizar feriados.
tip.15.name=Calendários
tip.16.description=Existem toneladas de fontes de informaçăo de Gerenciamento de Projetos na web. O ProjectLibre é muito semelhante a soluçőes comerciais existentes.
tip.16.name=Informaçőes sobre GP
tip.17.description=Para excluir uma tarefa, clique com o botăo direito na linha da planilha para opçőes.
tip.17.name=Deletando

